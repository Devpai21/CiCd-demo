<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheer Up - Tinker Bell Magic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a472a 0%, #2a6230 50%, #3c8c40 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Comic Neue', cursive, 'Apple Color Emoji', 'Noto Color Emoji';
            overflow: hidden;
            position: relative;
        }
        .message {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 60px;
            padding: 50px 80px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 3px solid gold;
            animation: glow 2s ease-in-out infinite;
            white-space: nowrap;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px gold; }
            50% { box-shadow: 0 0 40px #ffd700; }
        }
        h1 {
            font-size: 3.5rem;
            color: #ff69b4;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #fff0f5;
        }
        p {
            font-size: 2rem;
            color: #2c3e50;
            margin: 20px 0;
        }
        .fairy {
            position: absolute;
            pointer-events: none;
            z-index: 20;
            font-size: 3rem;
            filter: drop-shadow(0 0 5px gold);
            text-shadow: 0 0 5px gold;
            animation: none;
            transition: none;
        }
        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: gold;
            border-radius: 50%;
            pointer-events: none;
            animation: sparklePulse 0.5s ease-out forwards;
            z-index: 25;
        }
        @keyframes sparklePulse {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        .counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 30;
            font-family: monospace;
        }
        .click-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>✨ Cheer Up Beautiful ✨</h1>
        <p>I'm here for you 🧚‍♀️</p>
        <p style="font-size: 2rem;">💚 🌟 ✨</p>
    </div>
    <div class="counter">✨ Fairies flying: <span id="fairyCount">0</span></div>
    <div class="click-hint">✨ Click anywhere to summon more fairies! ✨</div>

    <script>
        // Fairy emojis (always work, no images needed!)
        const fairyEmojis = ['🧚', '🧚‍♀️', '🧚‍♂️', '✨', '⭐', '💫', '🦋', '🌸'];
        
        let activeFairies = [];
        let fairyId = 0;
        
        function createSparkles(x, y) {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 40;
                    const offsetX = Math.cos(angle) * distance;
                    const offsetY = Math.sin(angle) * distance;
                    sparkle.style.left = (x + offsetX) + 'px';
                    sparkle.style.top = (y + offsetY) + 'px';
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 500);
                }, i * 20);
            }
        }
        
        function updateCounter() {
            document.getElementById('fairyCount').innerText = activeFairies.length;
        }
        
        function createFairy() {
            const id = fairyId++;
            const fairy = document.createElement('div');
            fairy.className = 'fairy';
            fairy.id = `fairy-${id}`;
            
            // Random emoji from the list
            const randomEmoji = fairyEmojis[Math.floor(Math.random() * fairyEmojis.length)];
            fairy.textContent = randomEmoji;
            
            // Random starting position
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            fairy.style.left = startX + 'px';
            fairy.style.top = startY + 'px';
            
            // Random size
            const size = 2 + Math.random() * 1.5;
            fairy.style.fontSize = `${size}rem`;
            
            document.body.appendChild(fairy);
            
            // Random movement properties
            let x = startX;
            let y = startY;
            let angle = Math.random() * Math.PI * 2;
            let speed = 0.5 + Math.random() * 1.5;
            let rotation = 0;
            let rotationSpeed = (Math.random() - 0.5) * 8;
            
            // Store fairy data
            const fairyData = {
                id: id,
                element: fairy,
                x: x,
                y: y,
                angle: angle,
                speed: speed,
                rotation: rotation,
                rotationSpeed: rotationSpeed,
                lastSparkle: Date.now(),
                emoji: randomEmoji
            };
            activeFairies.push(fairyData);
            updateCounter();
            
            // Animation loop
            function animate() {
                const index = activeFairies.findIndex(f => f.id === id);
                if (index === -1) return;
                
                const f = activeFairies[index];
                
                // Change direction occasionally (random walk)
                if (Math.random() < 0.02) {
                    f.angle += (Math.random() - 0.5) * Math.PI / 2;
                }
                
                // Update position
                f.x += Math.cos(f.angle) * f.speed;
                f.y += Math.sin(f.angle) * f.speed;
                f.rotation += f.rotationSpeed;
                
                // Wrap around screen edges
                if (f.x > window.innerWidth + 50) f.x = -50;
                if (f.x < -50) f.x = window.innerWidth + 50;
                if (f.y > window.innerHeight + 50) f.y = -50;
                if (f.y < -50) f.y = window.innerHeight + 50;
                
                // Apply position and rotation
                f.element.style.left = f.x + 'px';
                f.element.style.top = f.y + 'px';
                f.element.style.transform = `rotate(${f.rotation}deg)`;
                
                // Create sparkles occasionally
                if (Date.now() - f.lastSparkle > 400) {
                    createSparkles(f.x + 25, f.y + 25);
                    f.lastSparkle = Date.now();
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
            
            // Remove fairy after 45 seconds
            setTimeout(() => {
                const idx = activeFairies.findIndex(f => f.id === id);
                if (idx !== -1) {
                    f.element.remove();
                    activeFairies.splice(idx, 1);
                    updateCounter();
                }
            }, 45000);
        }
        
        // Create initial fairies
        for (let i = 0; i < 15; i++) {
            setTimeout(() => createFairy(), i * 200);
        }
        
        // Continuously add new fairies every 4 seconds
        setInterval(() => {
            if (activeFairies.length < 25) {
                createFairy();
            }
        }, 4000);
        
        // Add fairies on click
        document.body.addEventListener('click', function(e) {
            createFairy();
            createSparkles(e.clientX, e.clientY);
        });
        
        // Resize handling
        window.addEventListener('resize', () => {
            // Optional: reposition fairies? Not needed, they'll wrap naturally
        });
    </script>
</body>
</html>
