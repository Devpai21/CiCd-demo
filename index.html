<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheer Up - Tinker Bell</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a472a 0%, #2a6230 50%, #3c8c40 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', cursive;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .message {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 60px;
            padding: 50px 80px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 3px solid gold;
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px gold; }
            50% { box-shadow: 0 0 40px #ffd700; }
        }
        h1 {
            font-size: 3.5rem;
            color: #ff69b4;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #fff0f5;
        }
        p {
            font-size: 2rem;
            color: #2c3e50;
            margin: 20px 0;
        }
        .tinkerbell {
            position: absolute;
            pointer-events: none;
            z-index: 20;
            filter: drop-shadow(0 0 5px gold);
            animation: fly 3s ease-out forwards;
        }
        @keyframes fly {
            0% {
                transform: translateX(0) translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateX(var(--fly-x, 300px)) translateY(var(--fly-y, -200px)) rotate(720deg);
                opacity: 0;
            }
        }
        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: gold;
            border-radius: 50%;
            pointer-events: none;
            animation: sparklePulse 0.5s ease-out forwards;
            z-index: 25;
        }
        @keyframes sparklePulse {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        .click-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>✨ Cheer Up Beautiful ✨</h1>
        <p>I'm here for you 🧚‍♀️</p>
        <p style="font-size: 2.5rem;">💚 🌟 💫</p>
    </div>
    <div class="click-hint">Click anywhere to make Tinker Bell fly! ✨</div>

    <script>
        // Tinker Bell images (fairy icons)
        const tinkerImages = [
            'https://cdn-icons-png.flaticon.com/512/1998/1998625.png',
            'https://cdn-icons-png.flaticon.com/512/1998/1998619.png',
            'https://cdn-icons-png.flaticon.com/512/1998/1998620.png',
            'https://cdn-icons-png.flaticon.com/512/2917/2917995.png'
        ];
        
        function createSparkles(x, y) {
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 50;
                    const offsetX = Math.cos(angle) * distance;
                    const offsetY = Math.sin(angle) * distance;
                    sparkle.style.left = (x + offsetX) + 'px';
                    sparkle.style.top = (y + offsetY) + 'px';
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 500);
                }, i * 30);
            }
        }
        
        function createTinkerBell(x, y) {
            const tinker = document.createElement('img');
            const randomImage = tinkerImages[Math.floor(Math.random() * tinkerImages.length)];
            tinker.src = randomImage;
            tinker.className = 'tinkerbell';
            tinker.style.left = x + 'px';
            tinker.style.top = y + 'px';
            tinker.style.width = '55px';
            tinker.style.height = '55px';
            
            // Random flight direction
            const flyX = (Math.random() * 400) - 200;
            const flyY = (Math.random() * 300) - 150;
            tinker.style.setProperty('--fly-x', flyX + 'px');
            tinker.style.setProperty('--fly-y', flyY + 'px');
            
            document.body.appendChild(tinker);
            createSparkles(x, y);
            
            setTimeout(() => {
                tinker.remove();
            }, 2900);
        }
        
        // Create Tinker Bell on click
        document.body.addEventListener('click', function(e) {
            createTinkerBell(e.clientX, e.clientY);
        });
        
        // Create a few fairies automatically on load
        setTimeout(() => {
            createTinkerBell(window.innerWidth / 2, window.innerHeight / 2);
        }, 500);
        setTimeout(() => {
            createTinkerBell(window.innerWidth / 3, window.innerHeight / 2);
        }, 1500);
        setTimeout(() => {
            createTinkerBell(window.innerWidth * 0.7, window.innerHeight * 0.6);
        }, 2500);
        
        // Continuous fairy generation every 8 seconds
        setInterval(() => {
            const randomX = Math.random() * window.innerWidth;
            const randomY = Math.random() * window.innerHeight;
            createTinkerBell(randomX, randomY);
        }, 8000);
    </script>
</body>
</html>
